<x-dc>
<div style="min-height:calc(100vh - 54px);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:40px 20px;animation:fadeUp .5s ease">
  <div style="position:absolute;inset:0;background-image:url('assets/images/bg-eclipse.png');background-size:cover;background-position:center center;background-repeat:no-repeat"></div>
  <div style="position:absolute;inset:0;background:rgba(5,6,12,0.55);pointer-events:none"></div>
  <div style="position:relative;width:100%;max-width:420px;background:#13121a;border:1px solid rgba(198,166,100,.2);border-radius:16px;padding:34px 30px;box-shadow:0 30px 80px rgba(0,0,0,.6)">
    <sc-if value="{{ regSent }}">
      <div style="text-align:center">
        <div style="width:52px;height:52px;border:1.5px solid rgba(127,174,143,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:22px;color:#7fae8f">✓</div>
        <h2 style="font-family:'Cinzel';font-weight:700;font-size:22px;margin:0;color:#efe8d8">Confirme seu email</h2>
        <p style="font-family:'Cormorant Garamond';font-style:italic;font-size:16px;color:#a39e90;margin:12px 0 0;line-height:1.5">Enviamos um link de confirmação para {{ reg.email }}. Clique nele para ativar seu cadastro e depois volte para entrar.</p>
        <div style="text-align:center;margin-top:22px;font-size:13px;color:#8d887c"><span onClick="{{ goLogin }}" style="color:#e0c179;cursor:pointer;text-decoration:underline">← Voltar para o login</span></div>
      </div>
    </sc-if>
    <sc-if value="{{ regFormVisible }}">
    <div style="text-align:center;margin-bottom:26px">
      <h2 style="font-family:'Cinzel';font-weight:700;font-size:26px;margin:0;color:#efe8d8">Criar Cadastro</h2>
      <p style="font-family:'Cormorant Garamond';font-style:italic;font-size:16px;color:#a39e90;margin:6px 0 0">Sua entrada para Saint Vesper</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:13px">
      <div>
        <label style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8d887c;display:block;margin-bottom:6px">Nome</label>
        <input value="{{ reg.name }}" onInput="{{ onRegName }}" placeholder="Seu nome completo" style="width:100%;background:#0d0c11;border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:13px;font-size:15px;color:#e9e3d4;outline:none"/>
      </div>
      <div>
        <label style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8d887c;display:block;margin-bottom:6px">Email</label>
        <input value="{{ reg.email }}" onInput="{{ onRegEmail }}" placeholder="voce@email.com" style="width:100%;background:#0d0c11;border:1px solid {{ regEmailBorder }};border-radius:5px;padding:13px;font-size:15px;color:#e9e3d4;outline:none"/>
      </div>
      <div>
        <label style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8d887c;display:block;margin-bottom:6px">Celular</label>
        <input value="{{ reg.phone }}" onInput="{{ onRegPhone }}" placeholder="(00) 00000-0000" style="width:100%;background:#0d0c11;border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:13px;font-size:15px;color:#e9e3d4;outline:none"/>
      </div>
      <div style="display:flex;gap:11px">
        <div style="flex:1">
          <label style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8d887c;display:block;margin-bottom:6px">Senha</label>
          <input type="password" value="{{ reg.pass }}" onInput="{{ onRegPass }}" placeholder="••••••" style="width:100%;background:#0d0c11;border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:13px;font-size:15px;color:#e9e3d4;outline:none"/>
        </div>
        <div style="flex:1">
          <label style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8d887c;display:block;margin-bottom:6px">Confirmar</label>
          <input type="password" value="{{ reg.pass2 }}" onInput="{{ onRegPass2 }}" placeholder="••••••" style="width:100%;background:#0d0c11;border:1px solid {{ regPass2Border }};border-radius:5px;padding:13px;font-size:15px;color:#e9e3d4;outline:none"/>
        </div>
      </div>
      <sc-if value="{{ regError }}"><div style="font-size:13px;color:#e08a8a;font-family:'Cormorant Garamond';font-style:italic">{{ regErrorMsg }}</div></sc-if>
      <button onClick="{{ submitRegister }}" disabled="{{ regDisabled }}" style="width:100%;margin-top:6px;padding:14px;background: {{ regBtnBg }};color: {{ regBtnCol }};border:none;border-radius:4px;font:700 12px 'Archivo';letter-spacing:.16em;text-transform:uppercase;cursor: {{ regCursor }}">{{ regBtnLabel }}</button>
    </div>
    <div style="text-align:center;margin-top:18px;font-size:13px;color:#8d887c">Já possui cadastro? <span onClick="{{ goLogin }}" style="color:#e0c179;cursor:pointer;text-decoration:underline">Entrar</span></div>
    </sc-if>
  </div>
</div>
</x-dc>

<x-dc>
<div style="min-height:calc(100vh - 54px);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:40px 20px;animation:fadeUp .5s ease">
  <div style="position:absolute;inset:0;background-image:url('assets/images/bg-mapa.png');background-size:cover;background-position:center center;background-repeat:no-repeat"></div>
  <div style="position:absolute;inset:0;background:rgba(5,6,12,0.50);pointer-events:none"></div>
  <div style="position:relative;width:100%;max-width:480px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#c6a35e;margin-bottom:12px">Mestre · Nova Mesa</div>
      <h2 style="font-family:'Cinzel';font-weight:700;font-size:30px;margin:0;color:#efe8d8">Dê um nome à sua mesa</h2>
      <p style="font-family:'Cormorant Garamond';font-style:italic;font-size:17px;color:#a39e90;margin:10px auto 0;max-width:380px">Ela fica salva neste navegador — você pode voltar para editar ou continuar o progresso, sem precisar de conta.</p>
    </div>
    <div style="background:#13121a;border:1px solid rgba(198,166,100,.2);border-radius:14px;padding:28px">
      <label style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#8d887c;display:block;margin-bottom:8px">Nome da mesa</label>
      <input value="{{ tableName }}" onInput="{{ onTableName }}" placeholder="Ex.: As Crônicas de Alta Vesper" style="width:100%;background:#0d0c11;border:1px solid rgba(198,166,100,.3);border-radius:6px;padding:15px;font-family:'Cinzel';font-size:18px;color:#e9e3d4;outline:none;margin-bottom:18px"/>
      <button onClick="{{ tableNameNext }}" disabled="{{ tableNameDisabled }}" style="width:100%;padding:15px;background: {{ tableNameBg }};color: {{ tableNameCol }};border:none;border-radius:4px;font:700 12px 'Archivo';letter-spacing:.16em;text-transform:uppercase;cursor: {{ tableNameCursor }}">Escolher o modo →</button>
    </div>
  </div>
</div>
</x-dc>
